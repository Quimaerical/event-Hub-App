name: eventhubapp
description: "A new Flutter project for Event Hub."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.6
  
  # Networking
  dio: ^5.7.0
  
  # JSON Parsing
  json_annotation: ^4.9.0
  
  # Storage & Cache
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  
  # Environment Variables
  flutter_dotenv: ^5.2.1
  
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
